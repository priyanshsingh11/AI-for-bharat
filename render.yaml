services:
  - type: web
    name: trustgraph-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set this in the dashboard
      - key: PYTHON_VERSION
        value: 3.10.0
