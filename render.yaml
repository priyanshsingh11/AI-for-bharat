services:
  # --- BACKEND (FastAPI) ---
  - type: web
    name: trustgraph-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set this in the Render Dashboard
      - key: PYTHON_VERSION
        value: 3.10.0
    plan: free

  # --- FRONTEND (Next.js) ---
  - type: web
    name: trustgraph-frontend
    runtime: node
    rootDir: frontend2
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false # Set this to your Render Backend URL
    plan: free
